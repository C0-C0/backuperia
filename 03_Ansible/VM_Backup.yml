---
# VM_Backup.yml
# Backs up Proxmox VMs by calling the Proxmox REST API (vzdump) via the
# community.proxmox collection. Runs from the controller — no SSH to the hosts.
#
# Requires: ansible-galaxy collection install community.proxmox
#           pip install proxmoxer requests   (on the controller / localhost)
#
# Usage: ansible-playbook -i inventory.yml VM_Backup.yml

- name: Backup Proxmox VMs via the Proxmox API
  hosts: proxmox_hosts
  gather_facts: false
  connection: local          # everything happens against the API, not over SSH

  # Defaults live inline via the `default()` filter below, NOT in a play
  # `vars:` block — play vars outrank inventory group_vars/host_vars, which
  # would silently override anything you set in inventory.yml.
  #   backup_storage  target storage ID (default: local)
  #   backup_mode     snapshot | suspend | stop (default: snapshot)
  #   backup_compress zstd | gzip | lzo | 0 (default: zstd)
  #   validate_certs  true once you have a trusted cert (default: false)
  #
  # This play always backs up every guest on the node (mode: all) — both VMs
  # and containers — so there is no per-VMID list to maintain in inventory.

  tasks:
    - name: Trigger vzdump backup through the Proxmox API
      community.proxmox.proxmox_backup:
        api_host: "{{ ansible_host }}"
        api_user: "{{ proxmox_api_user }}"
        api_token_id: "{{ proxmox_api_token_id }}"
        api_token_secret: "{{ proxmox_api_token_secret }}"
        validate_certs: "{{ validate_certs | default(false) }}"
        node: "{{ proxmox_node }}"
        storage: "{{ backup_storage | default('local') }}"
        mode: all                  # every VM and container on the node
        backup_mode: "{{ backup_mode | default('snapshot') }}"
        compress: "{{ backup_compress | default('zstd') }}"
        wait: true                 # block until the backup job finishes
        wait_timeout: 3600
      register: backup_result

    - name: Report backup outcome
      ansible.builtin.debug:
        var: backup_result
